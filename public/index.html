<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0d0f">
  <meta name="description" content="Plan and track family trips together">

  <!-- PWA: iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Uhambo">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Uhambo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- OpenLayers CSS (lazy, loaded by map.js when needed) -->

  <!-- App CSS -->
  <link rel="stylesheet" href="css/app.css">

  <!-- Firebase SDK (importmap) -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app":           "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth":          "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore":     "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
  </script>
</head>
<body>

<!-- Loading overlay (shown during Firebase init) -->
<div id="loading-overlay">
  <div class="logo-big">u</div>
  <div class="spinner"></div>
</div>

<!-- Login screen -->
<div id="login-screen" class="hidden">
  <div class="login-logo">u</div>
  <div class="login-wordmark">Uhambo</div>
  <button class="login-btn" id="google-login-btn">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>
  <div class="login-divider"><span>or</span></div>
  <div class="login-guest-section">
    <input class="guest-code-input" id="guest-code-input" placeholder="Guest Code" maxlength="8" autocomplete="off">
    <button class="btn btn-secondary btn-full" id="guest-enter-btn">Enter as Guest</button>
  </div>
  <p class="login-footer" style="text-align:center">Copyright &#9400; 2026, YONKE All rights reserved.<br>Version <span id="login-version">…</span></p>
</div>

<!-- Main App -->
<div id="app">
  <!-- Header -->
  <header class="app-header">
    <div class="logo">u <span>Uhambo</span></div>
    <div class="header-controls">
      <button class="trip-btn" id="trip-selector-btn" onclick="window.__openTripPicker()">&#8212; Select trip &#8212;</button>
      <button class="icon-btn" id="refresh-btn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Page content -->
  <main id="page-content">
    <div id="page-dashboard"     class="page-container"></div>
    <div id="page-itinerary"     class="page-container" style="display:none"></div>
    <div id="page-booking"        class="page-container" style="display:none"></div>
    <div id="page-activities"    class="page-container" style="display:none"></div>
    <div id="page-expenses"      class="page-container" style="display:none"></div>
    <div id="page-archive"       class="page-container" style="display:none"></div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="app-nav">
    <button class="tab-btn active" data-route="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Dashboard</span>
    </button>
    <button class="tab-btn" data-route="itinerary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="8" y2="14" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="12" y1="14" x2="12" y2="14" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="16" y1="14" x2="16" y2="14" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8" y1="18" x2="8" y2="18" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="18" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span>Itinerary</span>
    </button>
    <button class="tab-btn" data-route="booking">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        <line x1="12" y1="12" x2="12" y2="16"/>
        <line x1="10" y1="14" x2="14" y2="14"/>
      </svg>
      <span>Booking</span>
    </button>
    <button class="tab-btn" data-route="activities">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span>Activity</span>
    </button>
    <button class="tab-btn" data-route="expenses">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
        <path d="M6 15h.01M10 15h4"/>
      </svg>
      <span>Expenses</span>
    </button>
    <button class="tab-btn" data-route="archive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Archive</span>
    </button>
  </nav>
</div>

<!-- Modal / Bottom Sheet -->
<div id="modal-root" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-drag-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div id="modal-save-progress" class="modal-progress"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Confirm dialog -->
<div id="confirm-overlay" class="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <p class="confirm-msg" id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-full" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger btn-full" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Calculator overlay -->
<div id="calc-root" class="calc-overlay">
  <div class="calc-sheet">
    <div class="calc-header">
      <button class="calc-close" onclick="window.__calcClose()">&#10005;</button>
    </div>
    <div class="calc-expr" id="calc-expr"></div>
    <div class="calc-display" id="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn calc-btn-clear" onclick="window.__calcClear()">C</button>
      <button class="calc-btn calc-btn-op" onclick="window.__calcParen()">(&nbsp;)</button>
      <button class="calc-btn calc-btn-op" onclick="window.__calcInput('%')">%</button>
      <button class="calc-btn calc-btn-op" onclick="window.__calcInput('&#247;')">&#247;</button>
      <button class="calc-btn" onclick="window.__calcInput('7')">7</button>
      <button class="calc-btn" onclick="window.__calcInput('8')">8</button>
      <button class="calc-btn" onclick="window.__calcInput('9')">9</button>
      <button class="calc-btn calc-btn-op" onclick="window.__calcInput('&#215;')">&#215;</button>
      <button class="calc-btn" onclick="window.__calcInput('4')">4</button>
      <button class="calc-btn" onclick="window.__calcInput('5')">5</button>
      <button class="calc-btn" onclick="window.__calcInput('6')">6</button>
      <button class="calc-btn calc-btn-op" onclick="window.__calcInput('-')">&#8722;</button>
      <button class="calc-btn" onclick="window.__calcInput('1')">1</button>
      <button class="calc-btn" onclick="window.__calcInput('2')">2</button>
      <button class="calc-btn" onclick="window.__calcInput('3')">3</button>
      <button class="calc-btn calc-btn-op" onclick="window.__calcInput('+')">+</button>
      <button class="calc-btn calc-btn-zero" onclick="window.__calcInput('0')">0</button>
      <button class="calc-btn" onclick="window.__calcInput('.')">.</button>
      <button class="calc-btn calc-btn-eq" onclick="window.__calcEval()">=</button>
      <button class="calc-btn calc-btn-confirm" onclick="window.__calcConfirm()">&#10003; Use</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- App Entry Point -->
<script type="module" src="js/app.js"></script>
</body>
</html>
