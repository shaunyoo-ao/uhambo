name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: yonke-uhambo
          channelId: live
          target: ''
          entryPoint: '.'

      # CRITICAL: Hosting action above does NOT deploy Firestore rules or indexes.
      # Without this step, changes to firestore.rules in the repo never take
      # effect in production, causing "Missing or insufficient permissions"
      # errors when client code reads collections the live rules don't allow.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules and indexes
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore --project yonke-uhambo
